<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3D Animal Model Viewer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="viewport-wrap" id="dropZone">
        <canvas id="viewerCanvas" aria-label="3D model viewport"></canvas>
        <div class="projection-card">
          <div class="projection-title" data-i18n="projectionTitle">投影面轮廓</div>
          <canvas id="projectionCanvas" width="220" height="160" aria-label="Projected silhouette preview"></canvas>
        </div>
        <div class="drop-overlay" id="dropOverlay">
          <div class="drop-card">
            <strong data-i18n="dropTitle">拖入 3D 模型文件</strong>
            <span data-i18n="dropSubtitle">支持 OBJ、STL、GLB/glTF；OBJ 可同时选择 MTL 和贴图</span>
          </div>
        </div>
      </section>

      <aside class="side-panel">
        <header>
          <div class="panel-header-row">
            <h1 data-i18n="appTitle">3D 模型查看器</h1>
            <button class="language-toggle" id="languageToggle" type="button" aria-label="Switch language">EN</button>
          </div>
          <p data-i18n="appIntro">选择或拖入模型后即可在浏览器中查看、旋转、缩放和平移。</p>
        </header>

        <div class="file-box">
          <label class="file-button">
            <span data-i18n="chooseFiles">选择 3D 文件</span>
            <input id="fileInput" type="file" multiple accept=".obj,.mtl,.png,.jpg,.jpeg,.stl,.glb,.gltf,.bin,.fbx,.usdz" />
          </label>
          <label class="file-button secondary">
            <span data-i18n="chooseFolder">选择整个文件夹</span>
            <input id="folderInput" type="file" webkitdirectory multiple />
          </label>
        </div>

        <div class="status" id="status" data-i18n="statusWaiting">等待选择模型文件。</div>

        <dl class="metadata">
          <dt data-i18n="metaFile">文件</dt><dd id="metaFile">-</dd>
          <dt data-i18n="metaFormat">格式</dt><dd id="metaFormat">-</dd>
          <dt data-i18n="metaVertices">顶点</dt><dd id="metaVertices">-</dd>
          <dt data-i18n="metaTriangles">三角面</dt><dd id="metaTriangles">-</dd>
          <dt data-i18n="metaSurfaceArea">表面积</dt><dd id="metaSurfaceArea">-</dd>
          <dt data-i18n="metaVolume">体积</dt><dd id="metaVolume">-</dd>
          <dt data-i18n="metaTexture">贴图</dt><dd id="metaTexture">-</dd>
        </dl>

        <section class="sun-panel">
          <h2 data-i18n="sunTitle">太阳位置</h2>
          <div class="angle-grid">
            <label>
              <span data-i18n="sunAzimuth">方位角</span>
              <input id="sunAzimuth" type="number" value="45" min="0" max="360" step="1" />
            </label>
            <label>
              <span data-i18n="sunElevation">高度角</span>
              <input id="sunElevation" type="number" value="35" min="-90" max="90" step="1" />
            </label>
          </div>
        </section>

        <section class="camera-panel">
          <h2 data-i18n="cameraTitle">相机视角</h2>
          <div class="camera-grid" aria-label="Camera view controls">
            <button class="camera-button camera-up" id="cameraPitchUp" type="button" title="Pitch up" data-i18n-title="cameraPitchUp">↑</button>
            <button class="camera-button camera-left" id="cameraYawLeft" type="button" title="Rotate left" data-i18n-title="cameraYawLeft">←</button>
            <button class="camera-button camera-reset" id="cameraReset" type="button" title="Reset view" data-i18n-title="cameraReset">↺</button>
            <button class="camera-button camera-right" id="cameraYawRight" type="button" title="Rotate right" data-i18n-title="cameraYawRight">→</button>
            <button class="camera-button camera-down" id="cameraPitchDown" type="button" title="Pitch down" data-i18n-title="cameraPitchDown">↓</button>
          </div>
          <p class="camera-note" data-i18n="cameraStepNote">每次点击按固定步长旋转 10°。</p>
        </section>

        <section class="scale-panel">
          <h2 data-i18n="scaleTitle">比例尺标定</h2>
          <button class="calibration-button" id="calibrationToggle" type="button" data-i18n="calibrationStart">选择两个标定点</button>
          <div class="calibration-readout">
            <span data-i18n="modelSegment">模型线段</span><strong id="modelSegmentLength">-</strong>
            <span data-i18n="scaleFactor">换算比例</span><strong id="scaleFactor">-</strong>
          </div>
          <div class="scale-grid">
            <label>
              <span data-i18n="realLength">真实长度</span>
              <input id="realLengthInput" type="number" min="0" step="0.01" placeholder="例如 12.4" data-i18n-placeholder="realLengthPlaceholder" />
            </label>
            <label>
              <span data-i18n="unit">单位</span>
              <input id="realUnitInput" type="text" value="cm" />
            </label>
          </div>
          <dl class="real-metadata">
            <dt data-i18n="realSurfaceArea">真实表面积</dt><dd id="realSurfaceArea">-</dd>
            <dt data-i18n="realVolume">真实体积</dt><dd id="realVolume">-</dd>
          </dl>
        </section>

        <section class="controls">
          <h2 data-i18n="controlsTitle">操作</h2>
          <p data-i18n="controlsText">左键拖动旋转；右键或 Shift+左键拖动平移；滚轮缩放；双击重置视角。</p>
        </section>
      </aside>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
